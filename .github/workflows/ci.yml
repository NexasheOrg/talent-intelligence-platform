name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tooling
        run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Compile check
        run: python -m compileall data tests
      - name: Tests
        run: pytest

  # Web and service jobs are added as those layers land (see docs/ROADMAP.md).
  # Keeping CI scoped to what exists keeps the build honest and green.
