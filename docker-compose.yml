# M0 local stack: `docker compose up --build`
#   db     -> Postgres
#   loader -> generates synthetic seed data and loads the gold schema, then exits
#   api    -> FastAPI over the gold layer  (http://localhost:8000)
#   web    -> React dashboard              (http://localhost:8080)

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tip
      POSTGRES_PASSWORD: tip
      POSTGRES_DB: tip
    ports:
      # host 5433 -> container 5432, so it won't clash with a Postgres already on 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tip -d tip"]
      interval: 3s
      timeout: 3s
      retries: 20

  loader:
    build:
      context: .
      dockerfile: data-platform/Dockerfile
    environment:
      DATABASE_URL: postgresql://tip:tip@db:5432/tip
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ./api
    environment:
      DATABASE_URL: postgresql://tip:tip@db:5432/tip
    ports:
      - "8000:8000"
    depends_on:
      loader:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
    ports:
      - "8080:80"
    depends_on:
      - api
